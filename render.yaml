databases:
  - name: cleo-asp-502-database
    databaseName: cleo_asp_502_database
    user: cleo_asp_502_database_user
    plan: free

services:
  - type: web
    name: 502-asp
    runtime: docker
    plan: free
    buildCommand: "docker build -t myapp ."
    startCommand: "docker run -p 3000:3000 myapp"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cleo-asp-502-database
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2 # sensible default
