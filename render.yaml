services:
  - type: web
    name: 502-asp
    runtime: docker
    plan: free
    buildCommand: bundle exec rake assets:precompile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cleo-asp-502-database
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
