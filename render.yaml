databases:
  - name: cleo-asp-502-database
    databaseName: cleo_asp_502_database
    user: cleo_asp_502_database_user
    plan: free

services:
  - type: web
    name: 502-asp
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    # preDeployCommand: "bundle exec rails db:migrate" # preDeployCommand only available on paid instance types
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cleo_asp_502_database
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2 # sensible default
